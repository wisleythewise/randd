const steps = [

    title: "The Big Picture",

    icon: "🗺️",
    code: `"""
The most atomic way to train and inference
a GPT in pure, dependency-free Python.
This file is the complete algorithm.
Everything else is just efficiency.
@karpathy
"""`,
    explanation: "This is Andrej Karpathy's pedagogical masterpiece: an entire GPT language model — training AND inference — in a single Python file with zero dependencies beyond the standard library.\n\nThe key insight is captured in the docstring: **\"Everything else is just efficiency.\"** PyTorch, CUDA kernels, FlashAttention, distributed training — these are all optimizations on top of the exact same algorithm you're about to see implemented from scratch.\n\nThe model trains on a dataset of ~32K human names and learns to generate new, plausible-sounding names. It's a tiny GPT, but it implements **every core concept** of the real thing: token embeddings, positional embeddings, multi-head self-attention, residual connections, RMSNorm, MLP blocks, softmax, cross-entropy loss, backpropagation via autograd, and the Adam optimizer.",

    id: 1,
    title: "Data Loading",
    subtitle: "Acquiring and preparing the training corpus",
    icon: "📦",
    code: `import os, math, random
random.seed(42)

# Download and load the dataset
if not os.path.exists('input.txt'):
    import urllib.request
    names_url = 'https://raw.githubusercontent.com/...'
    urllib.request.urlretrieve(names_url, 'input.txt')

docs = [l.strip() for l in open('input.txt')
        .read().strip().split('\\n')
        if l.strip()]
random.shuffle(docs)
print(f"num docs: {len(docs)}")`,
    explanation: "The dataset is a text file of ~32,000 human names (one per line), sourced from Karpathy's \"makemore\" project.\n\nEach name becomes a separate \"document\" — this is the same conceptual framework as training GPT on web pages, just at a much smaller scale. The shuffle ensures the model sees names in random order during training, preventing it from memorizing ordering patterns.\n\n**Why names?** They're short (typically 3–10 characters), so sequences fit in tiny context windows. They have real statistical structure (common letter patterns, syllable structures) that a model can actually learn. And you can immediately tell if generated names \"look right.\"\n\nThe only imports are `os`, `math`, and `random` — all from Python's standard library. No NumPy, no PyTorch, no TensorFlow. Just pure Python.",

    title: "Tokenizer",
    subtitle: "Mapping characters to integers",
    icon: "🔤",
    code: `# unique chars become token ids 0..n-1
uchars = sorted(set(''.join(docs)))

BOS = len(uchars)  # Beginning of Sequence token
vocab_size = len(uchars) + 1  # +1 for BOS

print(f"vocab size: {vocab_size}")`,
    explanation: "Tokenization converts raw text into a sequence of integers that the model can process. Here, each unique **character** becomes its own token — this is the simplest possible tokenizer.\n\nReal GPTs use subword tokenizers like BPE (Byte Pair Encoding) with vocabularies of 50K–100K tokens. Here the vocabulary is just the ~27 unique characters found in the names dataset (lowercase letters plus a few special characters), giving a vocab size of ~28.\n\n**The BOS (Beginning of Sequence) token** is a special sentinel. It serves as both the \"start\" signal and the \"end\" signal:\n• The model always sees BOS as the first token\n• When the model predicts BOS, it means \"I'm done generating\"\n\nThis dual-use is elegant — many production models use separate tokens (e.g., `<|endoftext|>`), but the idea is the same.\n\nThe mapping is simply: `character → index in sorted list`. So `'a'` might be token 0, `'b'` token 1, etc.",
    tags: ["tokenizer"],
  },
  {
    id: 3,
    title: "Autograd Engine",
    subtitle: "The Value class — automatic differentiation",
    icon: "⚡",
    code: `class Value:
    __slots__ = ('data', 'grad',
                 '_children', '_local_grads')

    def __init__(self, data, children=(),
                 local_grads=()):
        self.data = data       # forward value
        self.grad = 0          # backward gradient
        self._children = children
        self._local_grads = local_grads`,
    explanation: "This is the heart of the entire system: a scalar-valued autograd engine. Every number in the model is wrapped in a `Value` object that tracks two things:\n\n**1. Forward pass (`data`):** The actual numerical value computed during the forward pass.\n\n**2. Backward pass (`grad`):** The derivative of the final loss with respect to this value, computed during backpropagation.\n\n**`_children`** and **`_local_grads`** form the computation graph. When you compute `c = a + b`, the resulting `Value` remembers that its children are `a` and `b`, and the local gradients are both `1` (since ∂(a+b)/∂a = 1 and ∂(a+b)/∂b = 1).\n\nThe `__slots__` optimization tells Python to use a fixed memory layout instead of a dictionary for attributes — a small but meaningful speedup when you're creating millions of these objects.\n\nThis is the same concept as PyTorch's `autograd` — just implemented at the scalar level instead of the tensor level.",
    tags: ["autograd", "core"],
  },
  {
    id: 4,
    title: "Autograd Operations",
    subtitle: "Defining differentiable arithmetic",
    icon: "➕",
    code: `def __add__(self, other):
    other = other if isinstance(other, Value) \\
            else Value(other)
    return Value(self.data + other.data,
                 (self, other), (1, 1))

def __mul__(self, other):
    other = other if isinstance(other, Value) \\
            else Value(other)
    return Value(self.data * other.data,
                 (self, other),
                 (other.data, self.data))

def __pow__(self, other):
    return Value(self.data**other, (self,),
                 (other * self.data**(other-1),))

def log(self):
    return Value(math.log(self.data), (self,),
                 (1/self.data,))

def exp(self):
    return Value(math.exp(self.data), (self,),
                 (math.exp(self.data),))

def relu(self):
    return Value(max(0, self.data), (self,),
                 (float(self.data > 0),))`,
    explanation: "Each operation does two things simultaneously: computes the forward value AND records the local gradient for backpropagation.\n\n**Addition** `a + b`: Result is `a + b`. Local gradients are both `1` because ∂(a+b)/∂a = 1 and ∂(a+b)/∂b = 1.\n\n**Multiplication** `a * b`: Result is `a × b`. Local gradients are `(b, a)` because ∂(ab)/∂a = b and ∂(ab)/∂b = a. This is the product rule.\n\n**Power** `a^n`: Uses the power rule: ∂(aⁿ)/∂a = n·aⁿ⁻¹.\n\n**Log** `log(a)`: Derivative is 1/a.\n\n**Exp** `exp(a)`: The beautiful self-derivative — ∂eᵃ/∂a = eᵃ.\n\n**ReLU** `max(0, a)`: Gradient is 1 if a > 0, else 0. It's a simple gate.\n\nThe helper methods (`__neg__`, `__sub__`, `__truediv__`, etc.) build complex operations from these primitives. For example, division `a/b` is implemented as `a * b⁻¹`, which is `a * b^(-1)`, chaining multiplication and power.",
    tags: ["autograd", "calculus"],
  },
  {
    id: 5,
    title: "Backpropagation",
    subtitle: "Reverse-mode automatic differentiation",
    icon: "🔄",
    code: `def backward(self):
    # Step 1: Topological sort
    topo = []
    visited = set()
    def build_topo(v):
        if v not in visited:
            visited.add(v)
            for child in v._children:
                build_topo(child)
            topo.append(v)
    build_topo(self)

    # Step 2: Reverse accumulation
    self.grad = 1
    for v in reversed(topo):
        for child, local_grad in zip(
            v._children, v._local_grads
        ):
            child.grad += local_grad * v.grad`,
    explanation: "This is the backpropagation algorithm — the engine that makes neural networks trainable. It computes ∂Loss/∂p for every parameter p in the model.\n\n**Step 1 — Topological Sort:** Before we can propagate gradients backward, we need to visit nodes in the right order. A topological sort ensures that when we process a node, all nodes that depend on it have already been processed. This is a depth-first post-order traversal of the computation graph.\n\n**Step 2 — Reverse Accumulation (the Chain Rule):** Starting from the loss (whose gradient is 1 by definition, since ∂L/∂L = 1), we walk backward through the sorted graph. For each node, we push its gradient to its children using the chain rule:\n\n`child.grad += local_grad × parent.grad`\n\nThe **`+=`** is crucial — a parameter might be used in multiple places (e.g., a weight matrix element used for multiple tokens), so gradients accumulate from all paths.\n\nThis is identical to what PyTorch's `loss.backward()` does — just operating on individual scalars instead of tensors. The tensor version is the same algorithm but batched over arrays for GPU efficiency.",
    tags: ["autograd", "backprop", "core"],
  },

    subtitle: "Configuring the architecture",
    icon: "🎛️",
    code: `n_embd = 16      # embedding dimension
n_head = 4       # number of attention heads
n_layer = 1      # number of layers
block_size = 16  # maximum sequence length
head_dim = n_embd // n_head  # = 4`,
    explanation: "These hyperparameters define the model's capacity. Compare with real GPTs:\n\n| Parameter | This Model | GPT-2 Small | GPT-3 |\n|-----------|-----------|-------------|-------|\n| n_embd | 16 | 768 | 12,288 |\n| n_head | 4 | 12 | 96 |\n| n_layer | 1 | 12 | 96 |\n| block_size | 16 | 1,024 | 2,048 |\n\n**n_embd = 16** — Each token is represented as a 16-dimensional vector. In real models this is 768–12,288. Larger dimensions capture richer semantic relationships.\n\n**n_head = 4** — The attention mechanism is split into 4 independent \"heads,\" each operating on 4-dimensional slices (`head_dim = 16/4 = 4`). Multiple heads let the model attend to different types of relationships simultaneously.\n\n**n_layer = 1** — Only one transformer block. Real GPTs stack 12–96 layers, each refining the representation. More layers = deeper reasoning.\n\n**block_size = 16** — Maximum context length of 16 tokens. This is fine for short names but would be catastrophically small for real text (GPT-4 uses 8K–128K).",
    tags: ["architecture", "config"],
  },
  {
    id: 7,
    title: "Parameter Initialization",
    subtitle: "Creating the weight matrices",
    icon: "🎲",
    code: `matrix = lambda nout, nin, std=0.08:
    [[Value(random.gauss(0, std))
      for _ in range(nin)]
     for _ in range(nout)]

state_dict = {
  'wte':     matrix(vocab_size, n_embd),
  'wpe':     matrix(block_size, n_embd),
  'lm_head': matrix(vocab_size, n_embd),
}
for i in range(n_layer):
  state_dict[f'layer{i}.attn_wq'] = \\

  state_dict[f'layer{i}.attn_wk'] = \\

  # ... wv, wo, mlp_fc1, mlp_fc2

params = [p for mat in state_dict.values()
          for row in mat for p in row]
print(f"num params: {len(params)}")`,
    explanation: "All parameters start as small random numbers drawn from a Gaussian distribution with std=0.08. This is critical — if all weights started at zero, every neuron would compute the same thing and gradients would be identical (symmetry breaking problem).\n\n**The weight matrices and what they learn:**\n\n**`wte` (Word Token Embeddings)** — Shape: [vocab_size × n_embd]. Maps each token ID to a learned 16-dimensional vector. Initially random, but after training, similar characters will have similar embeddings.\n\n**`wpe` (Word Position Embeddings)** — Shape: [block_size × n_embd]. Encodes *where* in the sequence a token appears. Position 0 gets one vector, position 1 another, etc. This is how the model knows word order.\n\n**`lm_head` (Language Model Head)** — Shape: [vocab_size × n_embd]. Projects the final hidden state back to vocabulary-sized logits for next-token prediction.\n\n**Per-layer attention weights** — `wq`, `wk`, `wv`, `wo` implement the Query, Key, Value, and Output projections of multi-head attention.\n\n**Per-layer MLP weights** — `mlp_fc1` expands from n_embd → 4×n_embd, `mlp_fc2` projects back down. This is where much of the model's \"knowledge\" is stored.\n\nThe `state_dict` naming mirrors PyTorch convention — you could conceptually load these into a real model.",
    tags: ["parameters", "initialization"],
  },
  {
    id: 8,
    title: "Building Blocks",
    subtitle: "Linear layers, softmax, and RMSNorm",
    icon: "🧱",
    code: `def linear(x, w):
    return [sum(wi * xi for wi, xi in zip(wo, x))
            for wo in w]

def softmax(logits):
    max_val = max(val.data for val in logits)
    exps = [(val - max_val).exp() for val in logits]
    total = sum(exps)
    return [e / total for e in exps]

def rmsnorm(x):
    ms = sum(xi * xi for xi in x) / len(x)
    scale = (ms + 1e-5) ** -0.5
    return [xi * scale for xi in x]`,
    explanation: "Three fundamental operations that the transformer uses everywhere:\n\n**Linear Layer** — Matrix-vector multiplication. Each output element is a dot product of a weight row with the input vector. This is the most basic neural network operation: `y = Wx`. No bias term (a simplification from GPT-2, common in modern architectures like LLaMA).\n\n**Softmax** — Converts arbitrary real numbers (\"logits\") into a probability distribution that sums to 1. The `max_val` subtraction is the \"log-sum-exp trick\" for numerical stability — without it, `exp(large_number)` would overflow to infinity. The probabilities are always positive and sum to 1, making them valid for sampling or computing cross-entropy loss.\n\n**RMSNorm (Root Mean Square Normalization)** — Normalizes the vector to have unit RMS (root mean square). This stabilizes training by preventing activations from growing or shrinking uncontrollably through layers. It's a simpler alternative to LayerNorm (used in GPT-2) — it skips the mean-centering step and has no learned scale/shift parameters. Modern models like LLaMA prefer RMSNorm for its simplicity and comparable performance.\n\nThe `1e-5` epsilon prevents division by zero if all activations happen to be zero.",
    tags: ["architecture", "math"],

    tok_emb = state_dict['wte'][token_id]

// ── State ──────────────────────────────────────────────
let currentStep = 0;
let expandedCode = true;

// ── Helpers ────────────────────────────────────────────
function escapeHtml(s) {
  return s
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function renderInline(text) {
  // Split on **bold** and `code` markers
  const parts = text.split(/(\*\*[^*\n]+\*\*|`[^`\n]+`)/g);
  return parts.map(part => {
    if (/^\*\*[^*]+\*\*$/.test(part)) {
      return '<strong>' + escapeHtml(part.slice(2, -2)) + '</strong>';
    }
    if (/^`[^`]+`$/.test(part)) {
      return '<code>' + escapeHtml(part.slice(1, -1)) + '</code>';
    }
    return escapeHtml(part);
  }).join('');
}

function isSeparatorRow(line) {
  return /^\|\s*[-:]+(\s*\|\s*[-:]+)*\s*\|?\s*$/.test(line.trim());
}

function renderParagraph(para) {
  const lines = para.split('\n');

  // Detect markdown table (all lines start/end with |)
  if (lines.length >= 2 && lines.every(l => l.trim().startsWith('|'))) {
    const dataRows = lines.filter(l => !isSeparatorRow(l));
    let html = '<table class="md-table"><tbody>';
    dataRows.forEach((row, i) => {
      const inner = row.trim().replace(/^\||\|$/g, '');
      const cells = inner.split('|').map(c => c.trim());
      const tag = i === 0 ? 'th' : 'td';
      html += '<tr>' + cells.map(c => `<${tag}>${escapeHtml(c)}</${tag}>`).join('') + '</tr>';
    });
    html += '</tbody></table>';
    return html;
  }

  // Regular paragraph: join lines with <br>
  const innerHtml = lines.map(line => renderInline(line)).join('<br>');
  return `<p class="para">${innerHtml}</p>`;
}

function renderExplanation(text) {
  return text.split('\n\n').map(renderParagraph).join('');
}

// ── Dots ───────────────────────────────────────────────
function renderDots() {
  const container = document.getElementById('dots-container');
  container.innerHTML = steps.map((s, i) => {
    const isActive = i === currentStep;
    const isPast = i < currentStep;
    const bg = isActive
      ? 'linear-gradient(90deg,#6a4a8a,#8a5aaa)'
      : isPast ? '#3a3a5a' : '#1e1e2e';
    const w = isActive ? '24px' : '8px';
    return `<div class="step-dot" title="${escapeHtml(s.title)}"
      style="width:${w};background:${bg}"
      onclick="goToStep(${i})"></div>`;
  }).join('');
}

// ── Step content ───────────────────────────────────────
function renderStepContent(step) {
  const tagsHtml = step.tags.map(tag => {
    const c = tagColors[tag] || { bg: '#1a1a2e', text: '#d4d4ff' };
    return `<span class="tag" style="background:${c.bg};color:${c.text}">${escapeHtml(tag)}</span>`;
  }).join('');

  let codeHtml = '';
  if (step.code) {
    const arrowClass = expandedCode ? 'open' : '';
    const toggleClass = expandedCode ? 'open' : 'closed';
    codeHtml = `
      <div class="code-wrapper">
        <div class="code-toggle ${toggleClass}" onclick="toggleCode()">
          <span>code</span>
          <span class="toggle-arrow ${arrowClass}">▼</span>
        </div>
        ${expandedCode
          ? `<div class="code-block">${escapeHtml(step.code)}</div>`
          : ''}
      </div>`;
  }

  const explanationHtml = step.explanation
    ? `<div class="explanation-text">${renderExplanation(step.explanation)}</div>`
    : '';

  const contentEl = document.getElementById('step-content');
  contentEl.className = 'fade-in';
  // Re-trigger animation by cloning
  const clone = contentEl.cloneNode(false);
  clone.innerHTML = `
    <div style="margin-bottom:28px">
      <div class="step-icon">${step.icon}</div>
      <h1 class="step-title">${escapeHtml(step.title)}</h1>
      <div class="step-subtitle">${escapeHtml(step.subtitle)}</div>
      <div class="tags-row">${tagsHtml}</div>
    </div>
    ${codeHtml}
    ${explanationHtml}
  `;
  contentEl.parentNode.replaceChild(clone, contentEl);
}

// ── Main render ────────────────────────────────────────
function render() {
  const step = steps[currentStep];
  const progress = currentStep === 0 ? 0 : (currentStep / (steps.length - 1)) * 100;

  document.getElementById('step-counter').textContent =
    `${currentStep + 1} / ${steps.length}`;
  document.getElementById('progress-bar').style.width = progress + '%';

  renderDots();
  renderStepContent(step);

  document.getElementById('btn-prev').disabled = currentStep === 0;
  document.getElementById('btn-next').disabled = currentStep === steps.length - 1;

  document.getElementById('content-area').scrollTo({ top: 0, behavior: 'smooth' });
}

// ── Actions ────────────────────────────────────────────
function navigate(dir) {
  const next = Math.max(0, Math.min(steps.length - 1, currentStep + dir));
  if (next !== currentStep) { currentStep = next; render(); }
}

function goToStep(i) {
  if (i !== currentStep) { currentStep = i; render(); }
}

function toggleCode() {
  expandedCode = !expandedCode;
  renderStepContent(steps[currentStep]);
}

// ── Keyboard ───────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
    e.preventDefault(); navigate(1);
  } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
    e.preventDefault(); navigate(-1);
  }
});

// ── Boot ───────────────────────────────────────────────
render();
</script>
