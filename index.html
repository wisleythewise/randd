<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Servo7 — R&D</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;700;800&display=swap');

    :root {
      --bg: #0a0a0a;
      --surface: #111;
      --border: #222;
      --accent: #e8ff47;
      --text: #f0f0f0;
      --muted: #666;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      line-height: 1.6;
    }

    header {
      padding: 48px 60px 32px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.2em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    header h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(28px, 4vw, 48px);
      font-weight: 800;
      line-height: 1.05;
    }

    header h1 span { color: var(--accent); }

    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 60px;
    }

    h2 {
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 20px;
    }

    .pages {
      display: grid;
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
    }

    .page-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      padding: 24px 28px;
      text-decoration: none;
      color: var(--text);
      transition: background 0.15s;
    }

    .page-link:hover { background: #161616; }
    .page-link:hover .arrow { color: var(--accent); }

    .page-title {
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 700;
    }

    .page-path {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
    }

    .arrow {
      font-size: 18px;
      color: var(--muted);
      transition: color 0.15s;
    }

    footer {
      border-top: 1px solid var(--border);
      padding: 32px 60px;
      font-size: 11px;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">Servo7</div>
  <h1>R&amp;D <span>index</span></h1>
</header>

<main>
  <h2>Pages</h2>
  <div class="pages">
    <a class="page-link" href="dagger.html">
      <div>
        <div class="page-title">Dagger</div>
        <div class="page-path">dagger.html</div>
      </div>
      <span class="arrow">→</span>
    </a>
    <a class="page-link" href="dagger/">
      <div>
        <div class="page-title">Dagger (alt)</div>
        <div class="page-path">dagger/</div>
      </div>
      <span class="arrow">→</span>
    </a>
  </div>
</main>

<footer>
  <span>Servo7, Inc. W26</span>
  <span>Robot resilience research 2026</span>
</footer>

</body>
</html>
