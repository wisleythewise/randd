const steps = [
  {
    title: "The Big Picture",
    subtitle: "What ACT is and why it matters",
    icon: "🤖",
    tags: ["act", "robotics", "architecture"],
    content: `
<div class="explanation-text">
<p class="para"><strong>Action Chunking Transformer (ACT)</strong> is one of the most effective approaches to robot imitation learning. Given a few human demonstrations, it learns to replicate complex manipulation tasks — picking, placing, inserting — with remarkable precision.</p>
<p class="para">The core idea: instead of predicting one robot action at a time (like a language model predicts one token), ACT predicts an entire <strong>chunk</strong> of future actions simultaneously. This turns out to be dramatically more effective.</p>
</div>
<div class="insight-box">ACT combines three powerful ideas: (1) an encoder-decoder transformer for action generation, (2) the DETR approach from object detection for parallel decoding, and (3) a CVAE-style variable to handle the multimodality of demonstrations.</div>
<div class="diagram-container">
  <canvas id="canvas-overview" width="780" height="520"></canvas>
  <div class="diagram-label">Full ACT architecture (Zhao et al., 2023) — CVAE encoder (left, training only) and main encoder-decoder (right)</div>
</div>
<div class="explanation-text">
<p class="para">Before we dive into ACT itself, we need to build up the foundations. We'll start with the transformer's core mechanism — <strong>attention</strong> — and work our way up to the full architecture.</p>
<p class="para">This walkthrough follows Willem's study notes, enriched with interactive diagrams and self-test questions. By the end, you'll understand every component of ACT and why each design choice was made.</p>
</div>
`
  },
  {
    title: "Self-Attention",
    subtitle: "Q, K, V — the building blocks of transformers",
    icon: "🔑",
    tags: ["transformer", "attention"],
    content: `
<div class="explanation-text">
<p class="para">At the heart of every transformer is <strong>self-attention</strong>. It's the mechanism that lets each element in a sequence look at every other element and decide what's relevant.</p>
<p class="para">Given an input matrix <strong>X</strong> (where each row is a token/position embedding), we compute three matrices:</p>
</div>
<div class="math-block" id="math-qkv"></div>
<div class="explanation-text">
<p class="para">These are just linear projections — multiply X by different learned weight matrices to get different "views" of the data:</p>
<p class="para"><strong>Query (Q):</strong> "What am I looking for?"<br><strong>Key (K):</strong> "What do I contain?"<br><strong>Value (V):</strong> "What information do I carry?"</p>
<p class="para">The attention output is then:</p>
</div>
<div class="math-block" id="math-attn"></div>
<div class="explanation-text">
<p class="para">The dot product <code>QK^T</code> measures how much each query matches each key. We scale by <code>sqrt(d)</code> to prevent the softmax from becoming too peaked when dimensions are large. The softmax turns these scores into probabilities, and we use them to take a weighted sum of the values.</p>
</div>
<div class="diagram-container">
  <canvas id="canvas-attention" width="780" height="340"></canvas>
  <div class="diagram-label">Self-attention: each position attends to all other positions via Q, K, V projections</div>
</div>
<div class="quiz-box">
  <div class="quiz-question">Why do we divide by sqrt(d) in the attention formula? What would happen without it?</div>
  <button class="quiz-reveal" onclick="toggleQuiz(this)">Reveal answer</button>
  <div class="quiz-answer">Without the scaling, when d is large the dot products <code>QK^T</code> grow in magnitude, pushing the softmax into regions where it has extremely small gradients (near 0 or 1). This makes training unstable. Dividing by sqrt(d) keeps the variance of the dot products at approximately 1, regardless of the dimensionality.</div>
</div>
`
  },
  {
    title: "Causal vs. Bidirectional",
    subtitle: "Two flavors of attention for different jobs",
    icon: "🔀",
    tags: ["transformer", "attention"],
    content: `
<div class="explanation-text">
<p class="para">Not all attention is created equal. The two main variants serve fundamentally different purposes:</p>
<p class="para"><strong>Causal (masked) attention</strong> is used in decoder-only models like GPT. Position <em>t</em> can only attend to positions 0 through <em>t</em>. This preserves temporal ordering — the model can't "peek" at future tokens. It's enforced by masking future positions to negative infinity before the softmax.</p>
<p class="para"><strong>Bidirectional attention</strong> is used in encoders (like BERT) and in encoder-decoder cross-attention. Every position can attend to every other position. This gives the model full context but means you can't do autoregressive generation.</p>
</div>
<div class="diagram-container">
  <canvas id="canvas-masks" width="780" height="300"></canvas>
  <div class="diagram-label">Left: causal mask (GPT-style) — Right: bidirectional (BERT-style / encoder)</div>
</div>
<div class="explanation-text">
<p class="para"><strong>Why does this matter for ACT?</strong> This is the critical design decision. If ACT used causal attention in its decoder (like GPT generating one token at a time), action <em>t</em> could only depend on actions 0 through <em>t-1</em>. The authors wanted the decoder to reason about the <strong>entire output sequence at once</strong> — and they found a clever way to do it using DETR-style queries (we'll get there in step 5).</p>
</div>
<div class="insight-box">The encoder in ACT uses bidirectional attention over the input (images + robot state). The decoder also gets to see all positions — no causal mask needed — thanks to the DETR trick.</div>
<div class="quiz-box">
  <div class="quiz-question">In a standard autoregressive decoder, why is causal masking necessary? And what limitation does it impose on the generated sequence?</div>
  <button class="quiz-reveal" onclick="toggleQuiz(this)">Reveal answer</button>
  <div class="quiz-answer">Causal masking prevents information leakage during training — without it, the model could trivially "copy" the answer from future positions. The limitation: each action is generated conditioned only on past actions, so the model can't consider future context when making a decision. ACT sidesteps this entirely by generating all actions in parallel via learned queries.</div>
</div>
`
  },
  {
    title: "The ACT Encoder",
    subtitle: "Images + robot state → contextual embeddings",
    icon: "📸",
    tags: ["act", "architecture", "cnn"],
    content: `
<div class="explanation-text">
<p class="para">The ACT encoder is the right-hand side of the architecture (the blue transformer). It takes in the robot's current observation and produces a set of rich contextual embeddings for the decoder to attend to.</p>
<p class="para">The inputs to the encoder are:</p>
<p class="para"><strong>1. Camera images</strong> — One or more RGB images are passed through a <code>ResNet-18</code> backbone (with the classification head removed). For each image, this produces <strong>512 feature maps</strong> of size 15&times;20. These are reshaped into <strong>300 vectors of dimension 512</strong> (the hidden dimension). Positional embeddings are added so the model knows which spatial region each vector came from.</p>
<p class="para"><strong>2. Robot proprioception</strong> — The current state of the robot (14 floats: 7 joint positions + 7 joint velocities, or similar) is projected to dimension 512 using a single linear layer.</p>
<p class="para"><strong>3. Style variable z</strong> — A latent variable from the CVAE (more on this in step 7). During training, this carries information about the specific trajectory. During inference, it's just zeros.</p>
</div>
<div class="diagram-container">
  <canvas id="canvas-encoder" width="780" height="400"></canvas>
  <div class="diagram-label">ACT encoder: CNN features + robot state + style variable z → contextual embeddings</div>
</div>
<div class="explanation-text">
<p class="para">The reshaping operation is worth pausing on: each of the 300 vectors concatenates all 512 feature activations at a particular spatial location. So vector <em>i</em> represents "everything the CNN sees" at spatial position <em>i</em> of the image.</p>
<p class="para">All these inputs get concatenated into a single sequence and passed through the transformer encoder's self-attention layers. The output: a set of embeddings that capture the full context of the current observation.</p>
</div>
<div class="quiz-box">
  <div class="quiz-question">Why use a pretrained CNN backbone instead of feeding raw pixels into the transformer?</div>
  <button class="quiz-reveal" onclick="toggleQuiz(this)">Reveal answer</button>
  <div class="quiz-answer">Raw pixels are high-dimensional and spatially redundant. A CNN backbone like ResNet-18 compresses the image into semantically meaningful features (edges, textures, objects) at reduced spatial resolution. This dramatically reduces the sequence length the transformer needs to process (300 vectors vs. thousands of pixel patches) and provides better inductive biases for visual features.</div>
</div>
`
  },
  {
    title: "DETR-Style Decoder",
    subtitle: "Learned queries replace autoregressive generation",
    icon: "🎯",
    tags: ["act", "detr", "architecture"],
    content: `
<div class="explanation-text">
<p class="para">This is the <strong>most ingenious part</strong> of ACT. In a standard transformer decoder (like GPT), you feed in the output tokens you've generated so far and predict the next one. This requires causal masking and sequential generation.</p>
<p class="para">ACT borrows from <strong>DETR (DEtection TRansformer)</strong>, an object detection model. DETR's key innovation: instead of feeding actual data into the decoder, you feed in <strong>learned query embeddings</strong> — fixed vectors that the model learns during training.</p>
<p class="para">In DETR, each query learns to "look for" a particular object in the image. In ACT, each query represents a <strong>time step in the action sequence</strong>. If the chunk size is 100, there are 100 learned queries, one per predicted action.</p>
</div>
<div class="diagram-container">
  <canvas id="canvas-detr" width="780" height="380"></canvas>
  <div class="diagram-label">DETR-style decoder: learned queries attend to encoder output → parallel action prediction</div>
</div>
<div class="explanation-text">
<p class="para"><strong>Critical implementation detail:</strong> The actual input to the decoder is a vector of <strong>all zeros</strong>. The learned query embeddings are added as positional encodings at every decoder layer:</p>
</div>
<div class="code-wrapper">
  <div class="code-toggle open" onclick="toggleCode(this)">
    <span>DETR decoder cross-attention</span>
    <span class="toggle-arrow open">&#9660;</span>
  </div>
  <div class="code-block">tgt2 = self.multihead_attn(
    query=self.with_pos_embed(tgt, query_pos),  # zeros + learned queries
    key=self.with_pos_embed(memory, pos),        # encoder output + pos
    value=memory,                                 # encoder output
    attn_mask=memory_mask,
    key_padding_mask=memory_key_padding_mask
)[0]</div>
</div>
<div class="explanation-text">
<p class="para">Because we're not passing in any ground-truth actions, there's <strong>no need for causal masking</strong>. Each query can attend to all other queries and to the full encoder output. This means when predicting action at time step <em>t</em>, the model can consider what it's predicting at time steps <em>t-1</em> and <em>t+1</em>.</p>
</div>
<div class="insight-box">The decoder input is zeros. The queries are positional encodings. Each layer adds queries to the running state, giving free residual connections that help gradient flow. No ground truth goes in, so no causal mask is needed.</div>
<div class="quiz-box">
  <div class="quiz-question">What are two advantages of the DETR-style decoder over an autoregressive decoder for action prediction?</div>
  <button class="quiz-reveal" onclick="toggleQuiz(this)">Reveal answer</button>
  <div class="quiz-answer">(1) <strong>Bidirectional reasoning:</strong> each predicted action can be influenced by both earlier and later actions in the chunk, leading to more coherent trajectories. (2) <strong>Parallel generation:</strong> all actions are predicted in a single forward pass, no sequential loop needed — this is much faster at inference time.</div>
</div>
`
  },

    subtitle: "How the full architecture connects",
    icon: "🔗",
    tags: ["act", "architecture"],
    content: `
<div class="explanation-text">
<p class="para">Let's put the full picture together. The ACT architecture has two main flows during <strong>training</strong>:</p>
<p class="para"><strong>Right side (blue):</strong> The main encoder-decoder transformer.</p>
<ul style="margin: 0 0 18px 20px; color: #b8b5c4; font-family: 'Crimson Pro', serif; font-size: 17px; line-height: 2;">
<li><strong>Encoder</strong> receives: CNN image features + robot state + style variable z</li>
<li><strong>Decoder</strong> receives: zeros as input, learned query embeddings as positional encoding</li>
<li><strong>Output:</strong> predicted actions for each time step in the chunk</li>
</ul>
<p class="para"><strong>Left side (gray):</strong> The CVAE encoder (a separate, smaller transformer).</p>
<ul style="margin: 0 0 18px 20px; color: #b8b5c4; font-family: 'Crimson Pro', serif; font-size: 17px; line-height: 2;">
<li>Sees the <strong>ground-truth action sequence</strong> we're trying to predict</li>
<li>Compresses it into the style variable z</li>
<li>Only used during training — discarded at inference</li>
</ul>
</div>
<div class="diagram-container">
  <canvas id="canvas-full-arch" width="780" height="440"></canvas>
  <div class="diagram-label">Full ACT architecture: CVAE encoder (left) feeds style variable z to the main encoder-decoder (right)</div>
</div>
<div class="explanation-text">
<p class="para">The <strong>loss function</strong> is straightforward: L1 distance between predicted and actual joint positions/actions at each time step. No fancy reward shaping, no reinforcement learning — just supervised regression on demonstration data.</p>
<p class="para">This simplicity is part of ACT's appeal. The architectural innovations (DETR queries + CVAE) do the heavy lifting, allowing a simple loss to be highly effective.</p>
</div>
`

    title: "The Style Variable z",
    subtitle: "Handling multimodality with a CVAE",
    icon: "🎨",

<p class="para"><strong>Chunking</strong> is the idea that gives ACT its name. Instead of predicting the next single action, the model predicts the next <strong>n</strong> actions (a "chunk") all at once.</p>
<p class="para">The chunk size is a hyperparameter — typically 50 to 100 time steps. At each observation, the model outputs a full trajectory chunk, but in practice you execute some fraction of it before querying the model again.</p>
<p class="para">The surprising finding: <strong>chunking dramatically improves performance across all methods</strong>, not just ACT:</p>
</div>

<div class="explanation-text">
<p class="para"><strong>Why does chunking work?</strong> The explanation draws from cognitive science:</p>
<p class="para">Humans don't plan movement at the level of individual muscle activations. We think in terms of <strong>cohesive actions</strong>: "reach for the cup," "lift it up," "bring it to my mouth." We <em>chunk</em> movements into meaningful units.</p>
<p class="para">The same principle applies to neural networks. It's "easier" to learn and reproduce <strong>sequences of coordinated movements</strong> than individual atomic actions. Predicting a chunk forces the model to reason about the <em>intent</em> behind a movement, not just the next incremental step.</p>
</div>
<div class="insight-box">Chunking is not ACT-specific — it's a general principle. Any method that predicts action sequences improves with chunking. This suggests that the temporal structure of actions has an inherent "chunk size" that models benefit from matching.</div>
<div class="explanation-text">
<p class="para">In practice, <strong>temporal ensembling</strong> smooths out the transitions between chunks. When you query the model at time <em>t</em> and again at <em>t+k</em>, the overlapping predictions are averaged with exponential weighting, giving priority to more recent predictions.</p>
</div>
<div class="quiz-box">

</div>

/* ── Rendering ── */
let currentStep = 0;

function renderStep(idx) {
  const s = steps[idx];
  const tagsHtml = s.tags.map(t => {
    const c = tagColors[t] || { bg: "#1a1a2e", text: "#ccc" };
    return `<span class="tag" style="background:${c.bg};color:${c.text}">${t}</span>`;
  }).join('');

  document.getElementById('step-content').innerHTML = `
    <div class="fade-in">
      <div class="step-icon">${s.icon}</div>
      <h2 class="step-title">${s.title}</h2>
      <div class="step-subtitle">${s.subtitle}</div>
      <div class="tags-row">${tagsHtml}</div>
      <div style="margin-top:28px">${s.content}</div>
    </div>
  `;

  document.getElementById('step-counter').textContent = `${idx + 1} / ${steps.length}`;
  document.getElementById('progress-bar').style.width = `${((idx + 1) / steps.length) * 100}%`;
  document.getElementById('btn-prev').disabled = idx === 0;
  document.getElementById('btn-next').disabled = idx === steps.length - 1;
  document.getElementById('content-area').scrollTop = 0;

  document.querySelectorAll('.step-dot').forEach((dot, i) => {
    dot.style.background = i === idx ? '#4ade80' : i < idx ? '#1a5a3a' : '#1e1e2e';
    dot.style.width = i === idx ? '24px' : '8px';
  });

  // Render math and diagrams after DOM update
  requestAnimationFrame(() => {
    renderMath();
    renderDiagrams(idx);
  });
}

function renderMath() {
  const qkv = document.getElementById('math-qkv');
  if (qkv && window.katex) {
    katex.render('Q = XW^Q \\quad K = XW^K \\quad V = XW^V', qkv, { displayMode: true });
  }
  const attn = document.getElementById('math-attn');
  if (attn && window.katex) {
    katex.render('\\text{Attention}(Q,K,V) = \\text{softmax}\\!\\left(\\frac{QK^T}{\\sqrt{d_k}}\\right)V', attn, { displayMode: true });
  }
}

function navigate(dir) {
  const next = currentStep + dir;
  if (next >= 0 && next < steps.length) {
    currentStep = next;
    renderStep(currentStep);
  }
}

function toggleQuiz(btn) {
  const answer = btn.nextElementSibling;
  answer.classList.toggle('visible');
  btn.textContent = answer.classList.contains('visible') ? 'Hide answer' : 'Reveal answer';
}

function toggleCode(el) {
  const block = el.nextElementSibling;
  const arrow = el.querySelector('.toggle-arrow');
  if (block.style.display === 'none') {
    block.style.display = 'block';
    el.classList.remove('closed');
    el.classList.add('open');
    arrow.classList.add('open');
  } else {
    block.style.display = 'none';
    el.classList.remove('open');
    el.classList.add('closed');
    arrow.classList.remove('open');
  }
}

/* ── Dots ── */
function buildDots() {
  const container = document.getElementById('dots-container');
  steps.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'step-dot';
    dot.style.width = '8px';
    dot.style.background = '#1e1e2e';
    dot.addEventListener('click', () => { currentStep = i; renderStep(i); });
    container.appendChild(dot);
  });
}

/* ── Keyboard nav ── */
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); navigate(1); }
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); navigate(-1); }
});

/* ── Canvas diagrams ── */
function renderDiagrams(stepIdx) {
  if (stepIdx === 0) drawOverviewDiagram();
  if (stepIdx === 1) drawAttentionDiagram();
  if (stepIdx === 2) drawMaskDiagram();
  if (stepIdx === 3) drawEncoderDiagram();
  if (stepIdx === 4) drawDetrDiagram();
  if (stepIdx === 5) drawFullArchDiagram();
  if (stepIdx === 6) drawCvaeDiagram();
  if (stepIdx === 7) drawChunkingDiagram();
}

function getCtx(id, w, h) {
  const c = document.getElementById(id);
  if (!c) return null;
  const dpr = window.devicePixelRatio || 1;
  c.width = w * dpr;
  c.height = h * dpr;
  c.style.width = w + 'px';
  c.style.height = h + 'px';
  const ctx = c.getContext('2d');
  ctx.scale(dpr, dpr);
  return ctx;
}

function drawBox(ctx, x, y, w, h, fill, stroke, text, textColor, fontSize) {
  ctx.fillStyle = fill;
  ctx.strokeStyle = stroke;
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.roundRect(x, y, w, h, 6);
  ctx.fill();
  ctx.stroke();
  if (text) {
    ctx.fillStyle = textColor || '#ccc';
    ctx.font = `${fontSize || 12}px IBM Plex Mono, monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const lines = text.split('\n');
    const lh = (fontSize || 12) + 4;
    const startY = y + h/2 - ((lines.length - 1) * lh) / 2;
    lines.forEach((line, i) => {
      ctx.fillText(line, x + w/2, startY + i * lh);
    });
  }
}

function drawArrow(ctx, x1, y1, x2, y2, color) {
  ctx.strokeStyle = color || '#4ade80';
  ctx.fillStyle = color || '#4ade80';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
  const angle = Math.atan2(y2 - y1, x2 - x1);
  ctx.beginPath();
  ctx.moveTo(x2, y2);
  ctx.lineTo(x2 - 8 * Math.cos(angle - 0.4), y2 - 8 * Math.sin(angle - 0.4));
  ctx.lineTo(x2 - 8 * Math.cos(angle + 0.4), y2 - 8 * Math.sin(angle + 0.4));
  ctx.closePath();
  ctx.fill();
}

  ctx.fillStyle = '#666';
  ctx.font = '11px IBM Plex Mono, monospace';
  ctx.textAlign = 'center';
  ['W^Q', 'W^K', 'W^V'].forEach((label, i) => {
    const bx = 480 + i * 100;
    drawBox(ctx, bx, 20, 80, 36, '#1e2a1e', '#3a5a3a', label, '#4ade80', 13);
  });

  // Q, K, V matrices
  drawBox(ctx, 480, 90, 80, 40, '#1a1a2e', '#4a4a8a', 'Q', '#aaaaff', 16);

  // Attention computation
  drawBox(ctx, 480, 165, 280, 45, '#0e1018', '#2a3a4a', 'softmax(QKᵀ / √d) · V', '#e0dce8', 14);
  drawArrow(ctx, 520, 130, 560, 163, '#aaaaff');
  drawArrow(ctx, 620, 130, 620, 163, '#ffaaaa');

  // Left side: attention weight visualization
  ctx.fillStyle = '#555';

  ctx.font = '10px IBM Plex Mono, monospace';
  ctx.textAlign = 'left';

  ctx.fillText('  and to x₃ (0.4 + 0.3 = 0.7)', gridX, gridY + cellSize + 54);

  // Multiplied by values arrow
  ctx.fillStyle = '#555';
  ctx.font = '11px IBM Plex Mono, monospace';
  ctx.textAlign = 'center';
  ctx.fillText('weights × values = weighted sum', 200, 230);
  drawBox(ctx, 120, 245, 160, 40, '#1a2e1a', '#3a6a3a', '0.1v₁+0.4v₂+0.3v₃+0.2v₄', '#aaffaa', 10);
}

function drawMaskDiagram() {

function drawChunkingDiagram() {
  const ctx = getCtx('canvas-chunking', 780, 320);
  if (!ctx) return;

  // Performance chart
  ctx.fillStyle = '#aaa';
  ctx.font = 'bold 12px IBM Plex Mono, monospace';
  ctx.textAlign = 'center';
  ctx.fillText('Success Rate vs. Chunk Size', 390, 20);

  // Axes
  const ax = 80, ay = 260, aw = 620, ah = 200;
  ctx.strokeStyle = '#3a3a5a';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(ax, ay - ah);
  ctx.lineTo(ax, ay);
  ctx.lineTo(ax + aw, ay);
  ctx.stroke();

  // Y-axis labels
  ctx.fillStyle = '#666';
  ctx.font = '10px IBM Plex Mono, monospace';
  ctx.textAlign = 'right';
  [0, 25, 50, 75, 100].forEach(v => {
    const y = ay - (v / 100) * ah;
    ctx.fillText(v + '%', ax - 10, y + 4);
    ctx.strokeStyle = '#1a1a24';
    ctx.beginPath();
    ctx.moveTo(ax, y);
    ctx.lineTo(ax + aw, y);
    ctx.stroke();
  });

  // X-axis labels
  ctx.textAlign = 'center';
  const chunkSizes = [1, 10, 25, 50, 100, 200];
  const xPositions = chunkSizes.map((_, i) => ax + 40 + i * (aw - 60) / (chunkSizes.length - 1));
  chunkSizes.forEach((cs, i) => {
    ctx.fillStyle = '#666';
    ctx.fillText(cs.toString(), xPositions[i], ay + 18);
  });
  ctx.fillText('Chunk Size', ax + aw / 2, ay + 36);

  // ACT line (high performance)
  const actScores = [40, 65, 82, 92, 96, 94];
  ctx.strokeStyle = '#4ade80';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  actScores.forEach((score, i) => {
    const x = xPositions[i];
    const y = ay - (score / 100) * ah;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  });
  ctx.stroke();

  // Dots on ACT line
  actScores.forEach((score, i) => {
    ctx.fillStyle = '#4ade80';
    ctx.beginPath();
    ctx.arc(xPositions[i], ay - (score / 100) * ah, 4, 0, Math.PI * 2);
    ctx.fill();
  });

  // Baseline line (lower performance)
  const baseScores = [20, 35, 50, 58, 62, 60];
  ctx.strokeStyle = '#ff6b4a';
  ctx.lineWidth = 2;
  ctx.setLineDash([4, 4]);
  ctx.beginPath();
  baseScores.forEach((score, i) => {
    const x = xPositions[i];
    const y = ay - (score / 100) * ah;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  });
  ctx.stroke();
  ctx.setLineDash([]);

  baseScores.forEach((score, i) => {
    ctx.fillStyle = '#ff6b4a';
    ctx.beginPath();
    ctx.arc(xPositions[i], ay - (score / 100) * ah, 3, 0, Math.PI * 2);
    ctx.fill();
  });

  // Legend
  ctx.fillStyle = '#4ade80';
  ctx.fillRect(550, 55, 20, 3);
  ctx.fillStyle = '#4ade80';
  ctx.font = '11px IBM Plex Mono, monospace';
  ctx.textAlign = 'left';
  ctx.fillText('ACT', 575, 59);

  ctx.fillStyle = '#ff6b4a';
  ctx.setLineDash([4, 4]);
  ctx.strokeStyle = '#ff6b4a';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(550, 77);
  ctx.lineTo(570, 77);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = '#ff6b4a';
  ctx.fillText('Baseline BC', 575, 80);

  // Annotation
  ctx.fillStyle = '#555';
  ctx.font = '10px IBM Plex Mono, monospace';
  ctx.textAlign = 'center';
  ctx.fillText('Both methods improve with chunking — but ACT benefits most', 390, 300);
}
